<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastrar Link - Práticas TDD 4</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-cadastro {
      border: none;
      border-radius: 1rem;
      box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.3);
      background-color: #f8f9fa;
      color: #343a40;
      padding: 2.5rem;
      width: 100%;
      max-width: 550px;
    }
  </style>
</head>
<body>

  <div class="card-cadastro">
    <h2 class="text-center mb-4"><i class="fas fa-plus-circle text-primary me-2"></i>Cadastrar Novo Link</h2>
    
    <form method="POST">
      {% csrf_token %}
      
      {% for field in form %}
        <div class="mb-3 text-start">
          <label class="form-label fw-bold">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}
            <div class="text-danger small mt-1">{{ field.errors.0 }}</div>
          {% endif %}
        </div>
      {% endfor %}

      <div class="d-grid gap-2 mt-4">
        <button type="submit" class="btn btn-primary"><i class="fas fa-save me-2"></i>Salvar Link</button>
        <a href="{% url 'home' %}" class="btn btn-outline-secondary"><i class="fas fa-arrow-left me-2"></i>Voltar ao Painel</a>
      </div>
    </form>
  </div>

</body>
</html>
