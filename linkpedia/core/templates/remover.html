<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Remover Link - Práticas TDD 4</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card-remover { border: none; border-radius: 1rem; box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.3); background-color: #f8f9fa; color: #343a40; padding: 2.5rem; width: 100%; max-width: 500px; text-align: center; }
  </style>
</head>
<body>
  <div class="card-remover">
    <h2 class="text-danger mb-3"><i class="fas fa-exclamation-triangle me-2"></i>Excluir Link</h2>
    <p class="lead">Tem certeza que deseja remover o link <strong>"{{ link.titulo }}"</strong>?</p>
    <p class="text-muted small">Esta ação não poderá ser desfeita.</p>
    
    <form method="POST">
      {% csrf_token %}
      <div class="d-grid gap-2 mt-4">
        <button type="submit" class="btn btn-danger"><i class="fas fa-trash-alt me-2"></i>Sim, Remover</button>
        <a href="{% url 'listar_links' %}" class="btn btn-outline-secondary"><i class="fas fa-times me-2"></i>Cancelar</a>
      </div>
    </form>
  </div>
</body>
</html>
