<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Lista de Links - Práticas TDD 4</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); color: white; min-height: 100vh; padding-top: 2rem; }
    .card-painel { border: none; border-radius: 1rem; background-color: #f8f9fa; color: #343a40; padding: 2rem; box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.3); }
  </style>
</head>
<body>
  <div class="container">
    <div class="card-painel">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-list text-secondary me-2"></i>Links Cadastrados</h2>
        <a href="{% url 'home' %}" class="btn btn-outline-dark"><i class="fas fa-arrow-left me-2"></i>Voltar</a>
      </div>

      <div class="table-responsive">
        <table class="table table-striped table-hover align-middle">
          <thead class="table-dark">
            <tr>
              <th>Título</th>
              <th>URL</th>
              <th>Observação</th>
              <th class="text-center">Ações</th>
            </tr>
          </thead>
          <tbody>
            {% for link in links %}
            <tr>
              <td class="fw-bold">{{ link.titulo }}</td>
              <td><a href="{{ link.link }}" target="_blank">{{ link.link }}</a></td>
              <td>{{ link.observacao|default:"-" }}</td>
              <td class="text-center">
                <a href="{% url 'atualizar_link' link.id %}" class="btn btn-warning btn-sm text-white me-1"><i class="fas fa-edit"></i></a>
                <form method="POST" action="{% url 'remover_link' link.id %}" style="display:inline;">
                  {% csrf_token %}
                  <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Tem certeza que deseja deletar este link?')"><i class="fas fa-trash-alt"></i></button>
                </form>
              </td>
            </tr>
            {% empty %}
            <tr>
              <td colspan="4" class="text-center text-muted">Nenhum link cadastrado ainda.</td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </div>
</body>
</html>
